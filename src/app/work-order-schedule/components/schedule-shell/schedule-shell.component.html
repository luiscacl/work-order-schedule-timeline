<main>
  <header class="shell__topbar">
    <img src="assets/brand/naologic.svg" alt="NAOLOGIC" />
  </header>
  <div class="shell__container">

    <h1 class="shell__title">Work Orders</h1>

    <app-timescale-select
      [value]="timescale"
      (valueChange)="onTimescaleChange($event)">
    </app-timescale-select>


    <app-timeline-grid
      [timescale]="timescale"
      [workCenters]="workCenters"
      [workOrders]="workOrders"
      (createAt)="openCreatePanel($event)"
      (editOrder)="openEditPanel($event)"
      (deleteOrder)="deleteWorkOrder($event)"
    ></app-timeline-grid>

    <app-work-order-drawer
      [open]="drawerOpen"
      [mode]="drawerMode"
      [workCenterId]="drawerWorkCenterId"
      [startPrefill]="drawerStart"
      [endPrefill]="drawerEnd"
      [editingOrder]="editingOrder"
      [allOrders]="workOrders"
      (cancel)="closeDrawer()"
      (save)="onDrawerSave($event)"
    ></app-work-order-drawer>
  </div>
</main>
